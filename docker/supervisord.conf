[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:mysql]
command=mysqld --user=mysql --socket=/run/mysqld/mysqld.sock
autostart=true
autorestart=true
priority=1
stdout_logfile=/dev/null
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:migrate]
command=/bin/sh -c "until mysqladmin --socket=/run/mysqld/mysqld.sock ping --silent; do sleep 1; done && cd /var/www/html && php artisan migrate --force"
autostart=true
autorestart=false
startsecs=0
priority=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/bin/sh -c "envsubst '${PORT}' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
autostart=true
autorestart=true
priority=4
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
